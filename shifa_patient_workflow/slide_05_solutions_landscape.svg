<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#00000044"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#f5f5f5"/>

  <!-- Header -->
  <rect width="1280" height="100" fill="#d32f2f"/>
  <text x="640" y="65" font-size="48" text-anchor="middle" font-weight="bold" fill="white">Proposed Solutions Landscape</text>

  <!-- Option 1: Premium AI -->
  <rect x="60" y="140" width="290" height="540" fill="white" stroke="#d32f2f" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <rect x="60" y="140" width="290" height="50" fill="#d32f2f"/>
  <text x="205" y="177" font-size="16" text-anchor="middle" font-weight="bold" fill="white">🤖 Premium AI</text>
  <text x="205" y="230" font-size="12" text-anchor="middle" font-weight="bold" fill="#212121">Voice Agent / Chatbot</text>
  <text x="205" y="255" font-size="11" text-anchor="middle" fill="#616161">Voiceoc, Interactly.ai</text>
  <text x="205" y="275" font-size="11" text-anchor="middle" fill="#616161">Assort Health, Retell AI</text>
  <text x="90" y="310" font-size="11" fill="#2e7d32">✓ 24/7 AI answering</text>
  <text x="90" y="330" font-size="11" fill="#2e7d32">✓ NLP triage</text>
  <text x="90" y="350" font-size="11" fill="#2e7d32">✓ Full automation</text>
  <text x="90" y="370" font-size="11" fill="#2e7d32">✓ High accuracy</text>
  <text x="90" y="410" font-size="11" fill="#d32f2f">✗ Expensive ($1000+/mo)</text>
  <text x="90" y="430" font-size="11" fill="#d32f2f">✗ Not free tier</text>
  <text x="90" y="450" font-size="11" fill="#d32f2f">✗ Complex setup</text>
  <text x="90" y="470" font-size="11" fill="#d32f2f">✗ Medical licensing needed</text>
  <rect x="75" y="505" width="260" height="50" fill="#ffebee" stroke="#d32f2f" stroke-width="1" rx="6"/>
  <text x="205" y="527" font-size="12" text-anchor="middle" font-weight="bold" fill="#b71c1c">Out of Budget</text>
  <text x="205" y="545" font-size="10" text-anchor="middle" fill="#c62828">for non-profit clinic</text>

  <!-- Option 2: Light AI + Zapier -->
  <rect x="377" y="140" width="290" height="540" fill="white" stroke="#f57c00" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <rect x="377" y="140" width="290" height="50" fill="#f57c00"/>
  <text x="522" y="177" font-size="16" text-anchor="middle" font-weight="bold" fill="white">💡 Light AI</text>
  <text x="522" y="230" font-size="12" text-anchor="middle" font-weight="bold" fill="#212121">Chatbot + Automation</text>
  <text x="522" y="255" font-size="11" text-anchor="middle" fill="#616161">Tidio, Crisp, Landbot</text>
  <text x="522" y="275" font-size="11" text-anchor="middle" fill="#616161">+ Zapier/Make</text>
  <text x="407" y="310" font-size="11" fill="#2e7d32">✓ Low cost ($50-200/mo)</text>
  <text x="407" y="330" font-size="11" fill="#2e7d32">✓ Conversational flow</text>
  <text x="407" y="350" font-size="11" fill="#2e7d32">✓ Google Sheet integration</text>
  <text x="407" y="370" font-size="11" fill="#2e7d32">✓ Customizable logic</text>
  <text x="407" y="410" font-size="11" fill="#f57c00">~ Moderate accuracy</text>
  <text x="407" y="430" font-size="11" fill="#f57c00">~ Learning curve</text>
  <text x="407" y="450" font-size="11" fill="#f57c00">~ Not 24/7 AI</text>
  <text x="407" y="470" font-size="11" fill="#f57c00">~ Requires workflow setup</text>
  <rect x="392" y="505" width="260" height="50" fill="#fff3e0" stroke="#f57c00" stroke-width="1" rx="6"/>
  <text x="522" y="527" font-size="12" text-anchor="middle" font-weight="bold" fill="#e65100">🎯 Recommended</text>
  <text x="522" y="545" font-size="10" text-anchor="middle" fill="#f57c00">Best balance for Shifa</text>

  <!-- Option 3: Manual + Google Forms -->
  <rect x="694" y="140" width="290" height="540" fill="white" stroke="#2e7d32" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <rect x="694" y="140" width="290" height="50" fill="#2e7d32"/>
  <text x="839" y="177" font-size="16" text-anchor="middle" font-weight="bold" fill="white">📋 Simple Centralization</text>
  <text x="839" y="230" font-size="12" text-anchor="middle" font-weight="bold" fill="#212121">Google Forms + Sheet</text>
  <text x="839" y="255" font-size="11" text-anchor="middle" fill="#616161">Structured intake</text>
  <text x="839" y="275" font-size="11" text-anchor="middle" fill="#616161">Light automation</text>
  <text x="724" y="310" font-size="11" fill="#2e7d32">✓ FREE (already using)</text>
  <text x="724" y="330" font-size="11" fill="#2e7d32">✓ Easy setup</text>
  <text x="724" y="350" font-size="11" fill="#2e7d32">✓ Structured data</text>
  <text x="724" y="370" font-size="11" fill="#2e7d32">✓ Conditional logic</text>
  <text x="724" y="410" font-size="11" fill="#d32f2f">✗ Not conversational</text>
  <text x="724" y="430" font-size="11" fill="#d32f2f">✗ Still some manual work</text>
  <text x="724" y="450" font-size="11" fill="#d32f2f">✗ No SMS automation</text>
  <text x="724" y="470" font-size="11" fill="#d32f2f">✗ Limited scalability</text>
  <rect x="709" y="505" width="260" height="50" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" rx="6"/>
  <text x="839" y="527" font-size="12" text-anchor="middle" font-weight="bold" fill="#1b5e20">Good Starting Point</text>
  <text x="839" y="545" font-size="10" text-anchor="middle" fill="#2e7d32">Upgrade to Light AI later</text>

  <!-- Option 4: Hybrid Advanced -->
  <rect x="1011" y="140" width="209" height="540" fill="white" stroke="#7b1fa2" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <rect x="1011" y="140" width="209" height="50" fill="#7b1fa2"/>
  <text x="1115.5" y="177" font-size="14" text-anchor="middle" font-weight="bold" fill="white">🚀 Full Stack</text>
  <text x="1115.5" y="230" font-size="11" text-anchor="middle" font-weight="bold" fill="#212121">Custom Development</text>
  <text x="1115.5" y="255" font-size="10" text-anchor="middle" fill="#616161">Web app + API</text>
  <text x="1115.5" y="275" font-size="10" text-anchor="middle" fill="#616161">+ SMS + AI</text>
  <text x="1041" y="310" font-size="10" fill="#2e7d32">✓ Full control</text>
  <text x="1041" y="330" font-size="10" fill="#2e7d32">✓ Scalable</text>
  <text x="1041" y="350" font-size="10" fill="#2e7d32">✓ Integrates all tools</text>
  <text x="1041" y="410" font-size="10" fill="#d32f2f">✗ Expensive</text>
  <text x="1041" y="430" font-size="10" fill="#d32f2f">✗ Long timeline</text>
  <text x="1041" y="450" font-size="10" fill="#d32f2f">✗ Ongoing maintenance</text>
  <rect x="1026" y="505" width="179" height="50" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1" rx="6"/>
  <text x="1115.5" y="527" font-size="11" text-anchor="middle" font-weight="bold" fill="#6a1b9a">Long-term Goal</text>
  <text x="1115.5" y="545" font-size="9" text-anchor="middle" fill="#7b1fa2">Phase 2/3</text>
</svg>
