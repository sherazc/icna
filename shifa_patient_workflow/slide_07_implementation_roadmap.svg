  <rect x="420" y="140" width="260" height="520" fill="white" stroke="#1565c0" stroke-width="2.5" rx="10" filter="url(#shadow)"/>
  <rect x="420" y="140" width="260" height="60" fill="#bbdefb"/>
  <text x="550" y="160" font-size="16" text-anchor="middle" font-weight="bold" fill="#0d47a1">Phase 2: Automation</text>
  <text x="550" y="182" font-size="12" text-anchor="middle" fill="#1565c0">Weeks 3-4</text>

  <text x="440" y="230" font-size="13" font-weight="bold" fill="#1565c0">🤖 Tasks:</text>
  <text x="445" y="255" font-size="12" fill="#212121">• Set up Tidio/Crisp</text>
  <text x="445" y="275" font-size="12" fill="#212121">• Configure Zapier</text>
  <text x="445" y="295" font-size="12" fill="#212121">• Build chatbot flow</text>
  <text x="445" y="315" font-size="12" fill="#212121">• Test Google Sheet</text>
  <text x="445" y="335" font-size="12" fill="#212121">• QA automation</text>
  <text x="445" y="370" font-size="12" font-weight="bold" fill="#2e7d32">✓ Deliverable:</text>
