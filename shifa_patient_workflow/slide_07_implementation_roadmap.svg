<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#00000044"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1565c0" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#f5f5f5"/>

  <!-- Header -->
  <rect width="1280" height="100" fill="#388e3c"/>
  <text x="640" y="65" font-size="48" text-anchor="middle" font-weight="bold" fill="white">Implementation Roadmap</text>

  <!-- Timeline -->
  <!-- Phase 1 -->
  <rect x="60" y="140" width="260" height="520" fill="white" stroke="#388e3c" stroke-width="2.5" rx="10" filter="url(#shadow)"/>
  <rect x="60" y="140" width="260" height="60" fill="#c8e6c9"/>
  <text x="190" y="160" font-size="16" text-anchor="middle" font-weight="bold" fill="#1b5e20">Phase 1: Foundation</text>
  <text x="190" y="182" font-size="12" text-anchor="middle" fill="#388e3c">Weeks 1-2</text>

  <text x="80" y="230" font-size="13" font-weight="bold" fill="#388e3c">📋 Tasks:</text>
  <text x="85" y="255" font-size="12" fill="#212121">• Evaluate tools</text>
  <text x="85" y="275" font-size="12" fill="#212121">• Set up Google Sheet</text>
  <text x="85" y="295" font-size="12" fill="#212121">• Create intake form</text>
  <text x="85" y="315" font-size="12" fill="#212121">• Design workflow</text>
  <text x="85" y="335" font-size="12" fill="#212121">• Train volunteers</text>
  <text x="85" y="370" font-size="12" font-weight="bold" fill="#2e7d32">✓ Deliverable:</text>
  <text x="85" y="390" font-size="11" fill="#388e3c">Centralized Google Sheet</text>
  <text x="85" y="408" font-size="11" fill="#388e3c">intake system ready</text>

  <!-- Arrow -->
  <line x1="320" y1="400" x2="400" y2="400" stroke="#1565c0" stroke-width="3" marker-end="url(#arrow)"/>

