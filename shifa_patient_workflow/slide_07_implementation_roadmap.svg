  <text x="805" y="255" font-size="12" fill="#212121">• Add SMS reminders</text>
  <text x="805" y="275" font-size="12" fill="#212121">• Build auto-tagging logic</text>
  <text x="805" y="295" font-size="12" fill="#212121">• Waitlist management</text>
  <text x="805" y="315" font-size="12" fill="#212121">• Athena EMR prep</text>
  <text x="805" y="335" font-size="12" fill="#212121">• Pilot testing</text>
  <text x="800" y="370" font-size="12" font-weight="bold" fill="#2e7d32">✓ Deliverable:</text>
  <text x="800" y="390" font-size="11" fill="#f57c00">Full workflow ready</text>
  <text x="800" y="408" font-size="11" fill="#f57c00">for clinic launch</text>

  <!-- Arrow -->
  <line x1="1040" y1="400" x2="1120" y2="400" stroke="#1565c0" stroke-width="3" marker-end="url(#arrow)"/>

