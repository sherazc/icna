  <rect x="1140" y="140" width="100" height="520" fill="white" stroke="#2e7d32" stroke-width="2.5" rx="10" filter="url(#shadow)"/>
  <rect x="1140" y="140" width="100" height="60" fill="#c8e6c9"/>
  <text x="1190" y="165" font-size="12" text-anchor="middle" font-weight="bold" fill="#1b5e20">Phase 4:</text>
  <text x="1190" y="182" font-size="12" text-anchor="middle" fill="#1b5e20">Launch</text>

  <text x="1190" y="250" font-size="11" text-anchor="middle" fill="#212121">• Go live</text>
  <text x="1190" y="275" font-size="11" text-anchor="middle" fill="#212121">• Monitor</text>
  <text x="1190" y="300" font-size="11" text-anchor="middle" fill="#212121">• Gather feedback</text>
  <text x="1190" y="350" font-size="10" text-anchor="middle" fill="#2e7d32" font-weight="bold">Ongoing:</text>
  <text x="1190" y="375" font-size="10" text-anchor="middle" fill="#2e7d32">Support &amp;</text>
  <text x="1190" y="395" font-size="10" text-anchor="middle" fill="#2e7d32">optimization</text>

  <!-- Bottom timeline summary -->
  <rect x="60" y="685" width="1160" height="25" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" rx="4"/>
  <text x="640" y="703" font-size="13" text-anchor="middle" fill="#1b5e20" font-weight="bold">6-Week Implementation • Low Risk • Iterative Improvements • Ready to Scale</text>
</svg>
