<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="40" font-size="24" text-anchor="middle" font-family="Arial" font-weight="bold">Current Patient Scheduling Workflow (Manual Step Problem)</text>

  <!-- Patient -->
  <rect x="60" y="100" width="120" height="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="8"/>
  <text x="120" y="125" font-size="16" text-anchor="middle" font-family="Arial">Patient</text>

  <!-- Calls Clinic -->
  <line x1="180" y1="120" x2="260" y2="120" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="110" font-size="12" text-anchor="middle" font-family="Arial">Calls</text>

  <!-- Clinic Phone -->
  <rect x="260" y="100" width="120" height="40" fill="#fffde7" stroke="#fbc02d" stroke-width="2" rx="8"/>
  <text x="320" y="125" font-size="14" text-anchor="middle" font-family="Arial">Clinic Phone</text>

  <!-- Asked to Email -->
  <line x1="380" y1="120" x2="460" y2="120" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="110" font-size="12" text-anchor="middle" font-family="Arial">Asked to Email</text>

  <!-- Email Inbox -->
  <rect x="460" y="100" width="120" height="40" fill="#e1f5fe" stroke="#0288d1" stroke-width="2" rx="8"/>
  <text x="520" y="125" font-size="14" text-anchor="middle" font-family="Arial">Email Inbox</text>

  <!-- Volunteer Manual Step (highlighted) -->
  <line x1="580" y1="120" x2="660" y2="120" stroke="#d32f2f" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="620" y="110" font-size="12" text-anchor="middle" font-family="Arial" fill="#d32f2f">Manual Check</text>

  <rect x="660" y="100" width="120" height="40" fill="#ffebee" stroke="#d32f2f" stroke-width="3" rx="8"/>
  <text x="720" y="125" font-size="14" text-anchor="middle" font-family="Arial" fill="#d32f2f">Volunteer</text>
  <text x="720" y="140" font-size="12" text-anchor="middle" font-family="Arial" fill="#d32f2f">(Logs in Excel)</text>

  <!-- Manual Data Entry Error Note -->
  <text x="720" y="160" font-size="12" text-anchor="middle" font-family="Arial" fill="#d32f2f">Manual Step Problem!</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L2,5 z" fill="#1976d2" />
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="60" y="400" width="680" height="70" fill="#fafafa" stroke="#bdbdbd" stroke-width="1" rx="8"/>
  <text x="400" y="425" font-size="14" text-anchor="middle" font-family="Arial">Red = Manual Step Problem (Volunteer checks email, logs in Excel)</text>
  <text x="400" y="445" font-size="12" text-anchor="middle" font-family="Arial">Issues: Missed/duplicate emails, manual data entry errors, volunteer workload, no centralized system</text>
</svg>
