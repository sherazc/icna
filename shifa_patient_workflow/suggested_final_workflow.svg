<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="40" font-size="24" text-anchor="middle" font-family="Arial" font-weight="bold">Suggested Final Workflow</text>

  <!-- Definitions for markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4CAF50" />
    </marker>
  </defs>

  <!-- Patient Input -->
  <rect x="50" y="100" width="150" height="60" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2" rx="10"/>
  <text x="125" y="135" font-size="16" text-anchor="middle" font-family="Arial">1. Patient Input</text>
  <text x="125" y="150" font-size="12" text-anchor="middle" font-family="Arial">(Form, Chatbot, or Call)</text>

  <!-- Arrow to Google Sheet -->
  <line x1="200" y1="130" x2="300" y2="130" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Google Sheet -->
  <rect x="300" y="100" width="150" height="60" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2" rx="10"/>
  <text x="375" y="135" font-size="16" text-anchor="middle" font-family="Arial">2. Google Sheet</text>
  <text x="375" y="150" font-size="12" text-anchor="middle" font-family="Arial">(Central Database)</text>

  <!-- Arrow to System -->
  <line x1="450" y1="130" x2="550" y2="130" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- System -->
  <rect x="550" y="100" width="150" height="60" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2" rx="10"/>
  <text x="625" y="135" font-size="16" text-anchor="middle" font-family="Arial">3. System</text>
  <text x="625" y="150" font-size="12" text-anchor="middle" font-family="Arial">(Auto-tags urgency)</text>

  <!-- Arrow down -->
  <line x1="625" y1="160" x2="625" y2="220" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Staff Review -->
  <rect x="550" y="220" width="150" height="60" fill="#fff9c4" stroke="#FFC107" stroke-width="2" rx="10"/>
  <text x="625" y="255" font-size="16" text-anchor="middle" font-family="Arial">4. Staff Reviews</text>
  <text x="625" y="270" font-size="12" text-anchor="middle" font-family="Arial">(Reviews queue)</text>

  <!-- Arrow to Provider -->
  <line x1="550" y1="250" x2="450" y2="250" stroke="#FFC107" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Provider -->
  <rect x="300" y="220" width="150" height="60" fill="#fff9c4" stroke="#FFC107" stroke-width="2" rx="10"/>
  <text x="375" y="255" font-size="16" text-anchor="middle" font-family="Arial">5. Providers</text>
  <text x="375" y="270" font-size="12" text-anchor="middle" font-family="Arial">(Submit availability)</text>

  <!-- Arrow to Staff Releases Slots -->
  <line x1="300" y1="250" x2="200" y2="250" stroke="#FFC107" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Staff Releases Slots -->
  <rect x="50" y="220" width="150" height="60" fill="#fff9c4" stroke="#FFC107" stroke-width="2" rx="10"/>
  <text x="125" y="255" font-size="16" text-anchor="middle" font-family="Arial">6. Staff</text>
  <text x="125" y="270" font-size="12" text-anchor="middle" font-family="Arial">(Releases slots via SMS)</text>

  <!-- Arrow down -->
  <line x1="125" y1="280" x2="125" y2="340" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Patient Confirms -->
  <rect x="50" y="340" width="150" height="60" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2" rx="10"/>
  <text x="125" y="375" font-size="16" text-anchor="middle" font-family="Arial">7. Patient</text>
  <text x="125" y="390" font-size="12" text-anchor="middle" font-family="Arial">(Confirms slot)</text>

  <!-- Arrow to Athena -->
  <line x1="200" y1="370" x2="300" y2="370" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Athena EMR -->
  <rect x="300" y="340" width="150" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="10"/>
  <text x="375" y="375" font-size="16" text-anchor="middle" font-family="Arial">8. Athena EMR</text>
  <text x="375" y="390" font-size="12" text-anchor="middle" font-family="Arial">(Data Entry)</text>

  <!-- Legend -->
  <g transform="translate(50, 500)">
    <rect width="400" height="120" fill="#fafafa" stroke="#bdbdbd" stroke-width="1" rx="8"/>
    <text x="200" y="25" font-size="16" text-anchor="middle" font-family="Arial" font-weight="bold">Legend</text>
    <rect x="20" y="45" width="20" height="20" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2" rx="4"/>
    <text x="50" y="60" font-size="14" font-family="Arial">Automated/Patient Steps</text>
    <rect x="20" y="85" width="20" height="20" fill="#fff9c4" stroke="#FFC107" stroke-width="2" rx="4"/>
    <text x="50" y="100" font-size="14" font-family="Arial">Manual Staff/Provider Steps</text>
  </g>
</svg>
